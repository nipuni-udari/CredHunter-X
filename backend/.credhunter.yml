scan:
  mode: changed-files
  fail_on: high
  include_history: false

filters:
  ignore_paths:
    - docs/**
    - tests/fixtures/**
  allow_placeholders: true

backend:
  url:

llm:
  enabled: false
  provider: openai
  model: o4-mini
  min_confidence: 0.8

validation:
  enabled: false
  network_enabled: false
  providers:
    - github
    - jwt
    - database_url
  timeout_seconds: 5
