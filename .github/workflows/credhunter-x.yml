name: CredHunter-X

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_REPORT_FORMAT: json
          GITLEAKS_REPORT_PATH: gitleaks-report.json

      - name: Run CredHunter-X
        uses: ./.github/actions/credhunter-x
        with:
          gitleaks_report: ../gitleaks-report.json
          config: .credhunter.yml
          fail_on: high
          json_output: ../credhunter-report.json
          sarif_output: ../credhunter-report.sarif
          pr_comment_output: ../credhunter-pr-comment.md

      - name: Upload CredHunter-X JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: credhunter-report
          path: |
            credhunter-report.json
            credhunter-pr-comment.md

      - name: Upload CredHunter-X SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: credhunter-report.sarif
