scan:
  mode: changed-files
  fail_on: high
  include_history: false

filters:
  ignore_paths:
    - docs/**
    - tests/fixtures/**
  allow_placeholders: true

backend:
  url:

llm:
  # The LLM pipeline (classify -> rank -> explain -> remediate) is ON by default.
  # Every stage degrades gracefully: without OPENAI_API_KEY, or on any API error,
  # the stage is skipped and the deterministic rule filter / risk score / template
  # remediation take over, so a full result is always produced offline.
  enabled: true
  provider: openai
  model: o4-mini
  min_confidence: 0.8
  workflow: single   # single | agentic (classifier ablation)
  rank: true         # LLM Ranker: refine risk score + prioritisation
  explain: true      # LLM Explainer: developer-facing rationale
  remediate: true    # LLM Remediation: context-specific fix steps

validation:
  enabled: false
  network_enabled: false
  providers:
    - github
    - jwt
    - database_url
  timeout_seconds: 5
